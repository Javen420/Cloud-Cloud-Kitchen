<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kitchen Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #111;
      color: #eee;
      padding: 24px;
    }

    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #666; margin-bottom: 24px; }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .controls button, .controls select {
      background: #222;
      color: #eee;
      border: 1px solid #444;
      padding: 8px 14px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
    }

    .controls button:hover { background: #333; }

    #status-msg {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
      min-height: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      color: #888;
      font-weight: normal;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #1e1e1e;
      vertical-align: top;
    }

    tr:hover td { background: #161616; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 2px;
    }

    .badge-pending         { background: #2a2a00; color: #aaaa00; }
    .badge-cooking         { background: #002a10; color: #00cc55; }
    .badge-finished_cooking{ background: #001a2a; color: #00aaff; }

    .actions button {
      background: #1a1a1a;
      color: #ccc;
      border: 1px solid #333;
      padding: 5px 10px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      margin-right: 6px;
    }

    .actions button:hover { background: #2a2a2a; border-color: #555; }
    .actions button:disabled { opacity: 0.3; cursor: default; }

    .btn-cook     { border-color: #005500 !important; color: #00cc55 !important; }
    .btn-done     { border-color: #004466 !important; color: #00aaff !important; }

    #no-orders {
      text-align: center;
      padding: 48px;
      color: #444;
      font-size: 13px;
    }
  </style>
</head>
<body>

<h1>Kitchen Dashboard</h1>
<p class="subtitle">Coordinate Order Fulfilment — <span id="current-filter">pending</span> orders</p>

<div class="controls">
  <select id="filter-select" onchange="setFilter(this.value)">
    <option value="pending">pending</option>
    <option value="cooking">cooking</option>
    <option value="finished_cooking">finished_cooking</option>
  </select>
  <button onclick="loadOrders()">↻ Refresh</button>
</div>

<div id="status-msg"></div>

<table id="orders-table">
  <thead>
    <tr>
      <th>Order ID</th>
      <th>Customer</th>
      <th>Items</th>
      <th>Total</th>
      <th>Delivery Address</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="orders-body">
    <tr><td colspan="7" id="no-orders">Loading...</td></tr>
  </tbody>
</table>

<script>
  const COORD_URL = "http://localhost:8094";
  let currentFilter = "pending";

  function setFilter(val) {
    currentFilter = val;
    document.getElementById("current-filter").textContent = val;
    loadOrders();
  }

  function setStatus(msg) {
    document.getElementById("status-msg").textContent = msg;
  }

  async function loadOrders() {
    setStatus("Fetching orders...");
    try {
      const resp = await fetch(`${COORD_URL}/orders?status=${currentFilter}`);
      const data = await resp.json();
      const orders = data.orders || [];
      renderOrders(orders);
      setStatus(`Loaded ${orders.length} order(s) — ${new Date().toLocaleTimeString()}`);
    } catch (err) {
      setStatus("Error fetching orders: " + err.message);
    }
  }

  function renderOrders(orders) {
    const tbody = document.getElementById("orders-body");

    // Filter pending orders to only show those with kitchen_id assigned
    const filtered = currentFilter === "pending"
      ? orders.filter(o => o.kitchen_id)
      : orders;

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="7" id="no-orders">No ${currentFilter} orders.</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(order => {
      const items = Array.isArray(order.items)
        ? order.items.map(i => `${i.Name || i.name} x${i.Quantity || i.quantity || i.qty || 1}`).join(", ")
        : JSON.stringify(order.items);

      const shortId = order.id.split("-")[0];
      const total   = (order.total_amount / 100).toFixed(2);
      const status  = order.status;

      const cookBtn = `<button class="btn-cook"
        ${status !== "pending" ? "disabled" : ""}
        onclick="updateStatus('${order.id}', 'cooking')">
        Started Cooking
      </button>`;

      const doneBtn = `<button class="btn-done"
        ${status !== "cooking" ? "disabled" : ""}
        onclick="updateStatus('${order.id}', 'finished_cooking')">
        Finished Cooking
      </button>`;

      return `
        <tr>
          <td title="${order.id}">${shortId}...</td>
          <td>${order.user_id ? order.user_id.split("-")[0] + "..." : "-"}</td>
          <td>${items}</td>
          <td>$${total}</td>
          <td>${order.delivery_address || order.dropoff_address || "-"}</td>
          <td><span class="badge badge-${status}">${status}</span></td>
          <td class="actions">${cookBtn}${doneBtn}</td>
        </tr>
      `;
    }).join("");
  }

  async function updateStatus(orderId, status) {
    setStatus(`Updating order ${orderId.split("-")[0]}... → ${status}`);
    try {
      const resp = await fetch(`${COORD_URL}/orders/${orderId}/status`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        setStatus("Error: " + (data.error || resp.statusText));
        return;
      }
      setStatus(`Order updated → ${status}`);
      await loadOrders();
    } catch (err) {
      setStatus("Error: " + err.message);
    }
  }

  // Auto-refresh every 15 seconds
  setInterval(loadOrders, 15000);

  // Initial load
  loadOrders();
</script>

</body>
</html>
